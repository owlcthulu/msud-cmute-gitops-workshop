apiVersion: apps/v1
kind: Deployment
metadata:
  name: paper
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paper
  template:
    metadata:
      labels:
        app: paper
      annotations:
        configmap-hash: "2"
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: paper
          image: ghcr.io/xata/msud-cmute-gitops-workshop:latest
          env:
            - name: MINECRAFT_PROMETHEUS_EXPORTER_HOST
              value: "0.0.0.0"
            - name: MINECRAFT_PROMETHEUS_EXPORTER_PORT
              value: "9940"
          ports:
            - containerPort: 25565
            - containerPort: 9940
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2.5Gi"
              cpu: "1000m"
          volumeMounts:
            - name: config
              mountPath: /server/server.properties
              subPath: server.properties
            - name: world
              mountPath: /server/world
            - name: exporter-config
              mountPath: /server/plugins/PrometheusExporter/config.yml
              subPath: config.yml
              readOnly: true
          startupProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 40
          readinessProbe:
            tcpSocket:
              port: 25565
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: paper-config
        - name: world
          persistentVolumeClaim:
            claimName: paper-world
        - name: exporter-config
          configMap:
            name: prometheus-exporter-config